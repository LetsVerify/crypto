<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>BBS Wasm Test</title>
</head>
<body>
    <h1>BBS Wasm Test</h1>
    <p>Open the browser's developer tools (Console) to view the output results.</p>

    <script type="module">
        import init, { 
            init_panic_hook, 
            setup_debug, 
            keygen_debug, 
            sign_debug, 
            verify,
            pok_nizk_prove_debug,
            pok_nizk_verify,
            user_commit,
            signer_sign,
            user_unblind
        } from '../pkg/bbs_wasm.js';

        async function runTest() {
            // Initialize Wasm
            await init();
            console.log("Wasm initialized successfully");
            
            init_panic_hook();
            console.log("Panic hook initialized successfully");

            try {
                console.log("=============================================");
                console.log("      BBS V2 Extended Scheme Pipeline        ");
                console.log("=============================================");

                // We need 4 public constraints + 2 hidden/semi-hidden (m_null, m_gamma)
                const numPublicMessages = 4;
                const totalMessages = numPublicMessages + 2; 

                // 1. Setup Parameters & Keys
                console.log(`\n=== 1. Init (L=${totalMessages}) ===`);
                const params = setup_debug(totalMessages);
                const keys = keygen_debug();
                console.log("G1", params.G1);
                console.log("G2", params.G2);
                console.log("Params (H Length):", params.H); 
                console.log("Signer Public Key:", keys.pk);
                console.log("Signer Secret Key:", keys.sk);

                // 2. User Apply (Commit)
                console.log("\n=== 2. User Apply (Commit) ===");
                // Using scalar string representations for testing purposes
                const m_null = "192837465"; 
                const m_gamma = "987654321";
                const lambda = "1122334455";
                const publicMessages = ["48305238028827234457057068308976830949311451167141786071899284143701496669988", 
                "30362564611297414121344052595118041020684015714278959822893592029797294529055", 
                "89017634352366059964332753369766654038457760534865200995547152036320389318152",
                "89017634352366059964332753369766654038457760534865200995547152036320389318152"]; // Constrains

                console.log("User's m_null:", m_null, "| m_gamma:", m_gamma, "| lambda:", lambda);
                const userCommitment = user_commit(m_null, m_gamma, lambda, params);
                console.log("User Commitment (C2):", userCommitment);

                // 3. Signer Generates Partial Signature
                console.log("\n=== 3. Signer Generates Partial Signature ===");
                console.log("Signer checking constraints:", publicMessages);
                const partialSig = signer_sign(keys.sk, publicMessages, params, userCommitment);
                console.log("Partial Signature:", partialSig);

                // 4. User Unblinds to Get Full Signature
                console.log("\n=== 4. User Unblind ===");
                const fullSig = user_unblind(partialSig, lambda);
                console.log("Full Signature:", fullSig);

                // Optional: Verify the standard full signature
                const allMessages = [...publicMessages, m_null, m_gamma];
                const isSigValid = verify(allMessages, fullSig, params, keys.pk);
                console.log("Standard Validity Check (Is sig valid?):", isSigValid);

                // 5. User Generates NIZK Proof (Prove ownership whilst hiding m_gamma)
                console.log("\n=== 5. User Generate NIZK Proof ===");
                // Disclose constraints + m_null
                const disclosedCount = numPublicMessages + 1;
                const proof = pok_nizk_prove_debug(params, keys.pk, allMessages, fullSig, disclosedCount);
                console.log(`Proof generated. Disclosed ${disclosedCount} messages (m_gamma is hidden).`);
                console.log("Proof Object:", proof);

                // 6. Verifier Verify NIZK Proof
                console.log("\n=== 6. Verifier Validate Proof ===");
                const disclosedMsgs = allMessages.slice(0, disclosedCount);
                console.log("Verifier checking disclosed msgs:", disclosedMsgs);
                const isProofValid = pok_nizk_verify(params, keys.pk, disclosedMsgs, proof);
                console.log("PoK Verify result:", isProofValid);

                if (isSigValid && isProofValid) {
                    console.log("\n✅ V2 Scheme all tests passed!");
                } else {
                    console.log("\n❌ V2 Scheme tests failed!");
                }
            } catch (err) {
                console.error("\n❌ An error occurred:", err);
            }
        }

        runTest();
    </script>
</body>
</html>
